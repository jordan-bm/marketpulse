<!-- src/main/resources/templates/ticker.html -->
 
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${symbol} + ' — MarketPulse'">Ticker — MarketPulse</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0D1B2A;
            color: #CBD5E1;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid rgba(27,153,139,0.25);
            background: rgba(13,27,42,0.95);
            position: sticky; top: 0; z-index: 100;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1B998B;
            letter-spacing: 0.08em;
            text-decoration: none;
        }
        .logo span { color: #F4C430; }

        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .nav-links a {
            color: #475569;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #1B998B; }

        /* ── Main ── */
        main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        /* ── Price card ── */
        .stock-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(27,153,139,0.2);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .stock-ticker {
            font-size: 2rem;
            font-weight: 700;
            color: #1B998B;
            letter-spacing: 0.05em;
        }
        .stock-price {
            font-size: 2rem;
            font-weight: 700;
            color: #E2E8F0;
        }
        .stock-meta { display: flex; gap: 2rem; flex-wrap: wrap; }
        .stock-meta-item { text-align: center; }
        .stock-meta-item .label {
            font-size: 0.7rem;
            color: #475569;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .stock-meta-item .value {
            font-size: 1.05rem;
            color: #94A3B8;
            margin-top: 2px;
        }

        /* ── Recommendation panel ── */
        .rec-panel {
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .rec-panel.bullish-strong  { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.35); }
        .rec-panel.bullish-lean    { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.25); }
        .rec-panel.neutral         { background: rgba(148,163,184,0.07); border: 1px solid rgba(148,163,184,0.2); }
        .rec-panel.bearish-lean    { background: rgba(251,146,60,0.08); border: 1px solid rgba(251,146,60,0.25); }
        .rec-panel.bearish-strong  { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.35); }

        .rec-badge {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .bullish-strong .rec-badge  { color: #4ADE80; }
        .bullish-lean .rec-badge    { color: #86EFAC; }
        .neutral .rec-badge         { color: #94A3B8; }
        .bearish-lean .rec-badge    { color: #FB923C; }
        .bearish-strong .rec-badge  { color: #F87171; }

        .rec-stats { display: flex; gap: 2rem; flex-wrap: wrap; }
        .rec-stat { text-align: center; }
        .rec-stat .label {
            font-size: 0.7rem;
            color: #475569;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .rec-stat .value { font-size: 1.1rem; margin-top: 2px; }
        .bullish { color: #4ADE80; }
        .bearish { color: #F87171; }
        .neutral-text { color: #94A3B8; }

        /* ── Charts ── */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 720px) { .charts-grid { grid-template-columns: 1fr; } }

        .chart-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 1.25rem;
        }
        .chart-card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #475569;
            margin-bottom: 1rem;
        }
        .chart-wrapper { height: 220px; position: relative; }

        /* ── Headlines ── */
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #475569;
            margin-bottom: 1rem;
        }
        .news-list { display: flex; flex-direction: column; gap: 0.6rem; }
        .news-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-left-width: 3px;
            border-radius: 8px;
            padding: 0.85rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }
        .news-item.positive { border-left-color: #4ADE80; }
        .news-item.negative { border-left-color: #F87171; }
        .news-item.neutral  { border-left-color: #334155; }

        .news-item .headline { font-size: 0.88rem; color: #CBD5E1; line-height: 1.4; flex: 1; }
        .news-item a { color: #CBD5E1; text-decoration: none; }
        .news-item a:hover { color: #1B998B; }
        .news-item .news-meta { text-align: right; white-space: nowrap; }
        .news-item .news-meta .source { font-size: 0.75rem; color: #475569; }
        .news-item .news-meta .score-pill {
            display: inline-block;
            margin-top: 4px;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .score-positive { background: rgba(74,222,128,0.15); color: #4ADE80; }
        .score-negative { background: rgba(248,113,113,0.15); color: #F87171; }
        .score-neutral  { background: rgba(148,163,184,0.1);  color: #64748B; }

        /* ── Watchlist button ── */
        .actions { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .btn-watchlist {
            background: transparent;
            border: 1px solid rgba(27,153,139,0.4);
            color: #1B998B;
            border-radius: 8px;
            padding: 0.5rem 1.2rem;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        .btn-watchlist:hover { background: rgba(27,153,139,0.1); border-color: #1B998B; }

        /* ── Error ── */
        .banner-error {
            padding: 0.85rem 1.2rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.35);
            color: #FCA5A5;
        }
    </style>
</head>
<body>

<header>
    <a class="logo" href="/dashboard">Market<span>Pulse</span></a>
    <div class="nav-links">
        <a href="/dashboard">← Back to Dashboard</a>
    </div>
</header>

<main>

    <div th:if="${error}" class="banner-error" th:text="${error}"></div>

    <!-- Price card -->
    <div th:if="${snapshot != null}" class="stock-card">
        <div class="stock-ticker" th:text="${symbol}">AAPL</div>
        <div class="stock-price" th:text="'$' + ${#numbers.formatDecimal(snapshot.price, 1, 2)}">$0.00</div>
        <div class="stock-meta">
            <div class="stock-meta-item">
                <div class="label">High</div>
                <div class="value" th:text="'$' + ${#numbers.formatDecimal(snapshot.high, 1, 2)}">—</div>
            </div>
            <div class="stock-meta-item">
                <div class="label">Low</div>
                <div class="value" th:text="'$' + ${#numbers.formatDecimal(snapshot.low, 1, 2)}">—</div>
            </div>
            <div class="stock-meta-item">
                <div class="label">Volume</div>
                <div class="value" th:text="${#numbers.formatInteger(snapshot.volume, 1, 'COMMA')}">—</div>
            </div>
            <div class="stock-meta-item">
                <div class="label">Updated</div>
                <div class="value" th:text="${#temporals.format(snapshot.timestamp, 'MM/dd HH:mm')}">—</div>
            </div>
        </div>
    </div>

    <!-- Recommendation panel -->
    <div th:if="${summary != null}"
         th:classappend="${recPanelClass}"
         class="rec-panel">
        <div class="rec-badge" th:text="${summary.recommendation}">⏸ Hold</div>
        <div class="rec-stats">
            <div class="rec-stat">
                <div class="label">Avg Sentiment</div>
                <div class="value neutral-text" th:text="${#numbers.formatDecimal(summary.averageSentiment, 1, 3)}">0.000</div>
            </div>
            <div class="rec-stat">
                <div class="label">Bullish</div>
                <div class="value bullish" th:text="${summary.bullishCount}">0</div>
            </div>
            <div class="rec-stat">
                <div class="label">Bearish</div>
                <div class="value bearish" th:text="${summary.bearishCount}">0</div>
            </div>
            <div class="rec-stat">
                <div class="label">Neutral</div>
                <div class="value neutral-text" th:text="${summary.neutralCount}">0</div>
            </div>
            <div class="rec-stat">
                <div class="label">Articles</div>
                <div class="value neutral-text" th:text="${summary.articleCount}">0</div>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="actions">
        <button class="btn-watchlist" onclick="alert('Watchlist coming in Step 13!')">+ Add to Watchlist</button>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
        <div class="chart-card">
            <h3>Price History</h3>
            <div class="chart-wrapper"><canvas id="priceChart"></canvas></div>
        </div>
        <div class="chart-card">
            <h3>Sentiment Timeline</h3>
            <div class="chart-wrapper"><canvas id="sentimentChart"></canvas></div>
        </div>
    </div>

    <!-- Scored headlines -->
    <div th:if="${articles != null and not #lists.isEmpty(articles)}">
        <div class="section-title">Recent Headlines — Sentiment Scored</div>
        <div class="news-list">
            <div th:each="article : ${articles}"
                 th:classappend="${article.sentimentScore != null and article.sentimentScore > 0.2} ? 'positive' : (${article.sentimentScore != null and article.sentimentScore < -0.2} ? 'negative' : 'neutral')"
                 class="news-item">
                <div class="headline">
                    <a th:href="${article.url}" th:text="${article.headline}" target="_blank">Headline</a>
                </div>
                <div class="news-meta">
                    <div class="source" th:text="${article.source} + ' · ' + ${#temporals.format(article.timestamp, 'MM/dd')}">Source</div>
                    <span th:if="${article.sentimentScore != null}"
                          th:classappend="${article.sentimentScore > 0.2} ? 'score-positive' : (${article.sentimentScore < -0.2} ? 'score-negative' : 'score-neutral')"
                          class="score-pill"
                          th:text="${#numbers.formatDecimal(article.sentimentScore, 1, 2)}">0.00</span>
                </div>
            </div>
        </div>
    </div>

</main>

<script th:src="@{/js/charts.js}"></script>
<script th:inline="javascript">
    const ticker = /*[[${symbol}]]*/ 'AAPL';
    initCharts(ticker);
</script>

</body>
</html>
